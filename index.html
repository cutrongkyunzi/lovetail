cm:[],im:[]},{id:"o5",dept:"ops",title:"결제 시스템",as:["somin"],status:"todo",note:"폼+토스",urg:false,due:"2026-09-15",cm:[],im:[]},{id:"l1",dept:"legal",title:"사업자등록",as:["me"],status:"todo",note:"업종코드",urg:true,due:"2026-08-10",cm:[],im:[]},{id:"l2",dept:"legal",title:"결혼중개업 문의",as:["me"],status:"todo",note:"구청 critical",urg:true,due:"2026-08-10",cm:[],im:[]},{id:"l3",dept:"legal",title:"통신판매업",as:["me"],status:"todo",note:"4만원",urg:false,due:"2026-08-15",cm:[],im:[]},{id:"l4",dept:"legal",title:"개인정보방침",as:["me"],status:"todo",note:"동의서",urg:false,due:"2026-09-15",cm:[],im:[]},{id:"f1",dept:"finance",title:"사업용 통장",as:["me"],status:"todo",note:"",urg:false,due:"2026-08-15",cm:[],im:[]},{id:"f2",dept:"finance",title:"지원금 검토",as:["me"],status:"done",note:"세액감면",urg:false,due:"",cm:[],im:[]},{id:"f3",dept:"finance",title:"업종코드 확인",as:["me"],status:"todo",note:"홈택스",urg:false,due:"2026-08-10",cm:[],im:[]},{id:"c1",dept:"content",title:"브랜드명",as:["somin","me"],status:"todo",note:"",urg:true,due:"2026-08-20",cm:[],im:[]},{id:"c2",dept:"content",title:"로고",as:["somin"],status:"todo",note:"자체제작",urg:false,due:"2026-09-10",cm:[],im:[]},{id:"c3",dept:"content",title:"톤앤매너",as:["somin"],status:"todo",note:"컬러,폰트",urg:false,due:"2026-09-10",cm:[],im:[]},{id:"c4",dept:"content",title:"콘텐츠 10개",as:["somin"],status:"todo",note:"한달치",urg:false,due:"2026-09-30",cm:[],im:[]},{id:"c5",dept:"content",title:"질문카드 디자인",as:["somin","me"],status:"todo",note:"인쇄물",urg:false,due:"2026-09-20",cm:[],im:[]}];
const DIDEAS=[{id:"s1",bd:"plan",tg:"diff",cl:"yellow",title:"프로필 후공개",body:"질문 카드로 먼저 대화",st:true,cm:[],im:[]},{id:"s2",bd:"plan",tg:"diff",cl:"pink",title:"거절공포 제거",body:"개인 DM 통보",st:true,cm:[],im:[]},{id:"s3",bd:"plan",tg:"diff",cl:"mint",title:"관계 지속",body:"매칭후 가이드",st:false,cm:[],im:[]},{id:"s4",bd:"plan",tg:"format",cl:"yellow",title:"2트랙",body:"가볍게 vs 적극적",st:false,cm:[],im:[]},{id:"s5",bd:"plan",tg:"theme",cl:"purple",title:"연말테마",body:"크리스마스,새해",st:false,cm:[],im:[]},{id:"s6",bd:"plan",tg:"ux",cl:"blue",title:"질문카드",body:"가벼운것→깊게",st:false,cm:[],im:[]},{id:"s7",bd:"plan",tg:"space",cl:"white",title:"성수동 카페",body:"팝업 문화",st:false,cm:[],im:[]},{id:"s8",bd:"plan",tg:"ref",cl:"yellow",title:"비긴어게인",body:"1650회,28쌍",st:false,cm:[],im:[]},{id:"s9",bd:"mkt",tg:"sns",cl:"mint",title:"인스타 방향",body:"스냅+카드뉴스",st:true,cm:[],im:[]},{id:"s10",bd:"mkt",tg:"copy",cl:"pink",title:"핵심 카피",body:"대화로 먼저",st:true,cm:[],im:[]},{id:"s11",bd:"mkt",tg:"viral",cl:"yellow",title:"후기바이럴",body:"5천원할인",st:false,cm:[],im:[]},{id:"s12",bd:"mkt",tg:"event",cl:"purple",title:"얼리버드",body:"무료/반값",st:false,cm:[],im:[]},{id:"s13",bd:"mkt",tg:"collab",cl:"blue",title:"카페제휴",body:"유휴시간 대관",st:false,cm:[],im:[]},{id:"s14",bd:"mkt",tg:"brand",cl:"white",title:"브랜드톤",body:"따뜻하고 자연스러운",st:true,cm:[],im:[]},{id:"s15",bd:"mkt",tg:"sns",cl:"yellow",title:"검색패턴",body:"수~목 최적",st:false,cm:[],im:[]}];

const SK="rotation-board-final";
const mem=id=>MM.find(m=>m.id===id);
const dep=id=>DPS.find(d=>d.id===id);
const todayS=new Date().toISOString().slice(0,10);
const dueL=due=>{if(!due)return null;const d=Math.ceil((new Date(due)-new Date(todayS))/864e5);if(d<0)return{t:`${-d}일 지남`,c:"#C00000"};if(d===0)return{t:"오늘",c:"#E23A57"};if(d<=7)return{t:`${d}일 남음`,c:"#E8A23D"};return{t:due.slice(5).replace("-","/"),c:"#6E6B78"};};
const fmtT=ts=>{const d=new Date(ts);return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;};
const resize=(file,cb)=>{const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const M=600;let w=img.width,ht=img.height;if(w>M){ht=ht*(M/w);w=M;}if(ht>M){w=w*(M/ht);ht=M;}const c=document.createElement("canvas");c.width=w;c.height=ht;c.getContext("2d").drawImage(img,0,0,w,ht);cb(c.toDataURL("image/jpeg",0.7));};img.src=ev.target.result;};r.readAsDataURL(file);};
function loadData(){try{let s=localStorage.getItem(SK);if(s){let d=JSON.parse(s);d.tasks=(d.tasks||[]).map(t=>({cm:[],im:[],as:t.assignees||t.as||["me"],urg:t.urgent||t.urg||false,...t}));d.ideas=(d.ideas||[]).map(i=>({cm:[],im:[],st:i.starred||i.st||false,bd:i.board||i.bd||"plan",tg:i.tag||i.tg||"diff",cl:i.color||i.cl||"yellow",...i}));return d;}const oldKeys=["rotation-board-v3","rotation-board-v2","rotation-biz-v2"];for(let k=0;k<oldKeys.length;k++){s=localStorage.getItem(oldKeys[k]);if(s){const d=JSON.parse(s);localStorage.setItem(SK,s);return loadData();}}}catch(e){}return{tasks:DT,ideas:DIDEAS};}
function saveData(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){alert("저장 공간 부족");}}

const cs={background:"transparent",border:"1px solid #E7E4EC",borderRadius:999,padding:"4px 10px",fontSize:10,fontWeight:600,color:"#6E6B78",cursor:"pointer"};
const ib={background:"none",border:"none",fontSize:11,cursor:"pointer",padding:2,opacity:.4};
const inp={width:"100%",border:"1px solid #E7E4EC",borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",fontFamily:"inherit",boxSizing:"border-box"};
const sel={border:"1px solid #E7E4EC",borderRadius:6,padding:"4px 8px",fontSize:11,outline:"none",fontFamily:"inherit",cursor:"pointer"};

const Chip=({on,color,children,...p})=><button style={{...cs,...(on?(color?{background:color,color:"#fff",borderColor:color}:{background:"#17151F",color:"#fff",borderColor:"#17151F"}):{})}} {...p}>{children}</button>;
const Lbl=({children})=><div style={{fontSize:11,fontWeight:700,color:"#6E6B78",marginBottom:3,marginTop:8}}>{children}</div>;
const Modal=({onClose,title,children})=><div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={onClose}><div style={{background:"#fff",borderRadius:16,padding:22,width:420,maxWidth:"92vw",maxHeight:"90vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}><div style={{fontSize:16,fontWeight:800,marginBottom:14}}>{title}</div>{children}</div></div>;
const APick=({value=[],onChange,sz})=><div style={{display:"flex",gap:4}}>{MM.map(m=>{const on=value.includes(m.id);return <button key={m.id} onClick={()=>{const n=on?value.filter(v=>v!==m.id):[...value,m.id];if(n.length)onChange(n);}} style={{display:"flex",alignItems:"center",gap:4,background:on?m.co+"18":"transparent",border:on?`1.5px solid ${m.co}`:"1.5px solid #E7E4EC",borderRadius:8,padding:sz==="md"?"5px 10px":"3px 8px",fontSize:sz==="md"?12:10,fontWeight:600,color:on?m.co:"#aaa",cursor:"pointer"}}>{m.em} {m.nm}</button>;})}</div>;

const Imgs=({images=[],onAdd,onRemove})=>{const[lb,setLb]=useState(null);const fr=useRef();const hf=files=>Array.from(files).filter(f=>f.type.startsWith("image/")).forEach(f=>resize(f,b=>onAdd(b)));
  return <><div className="img-grid">{images.map((img,i)=><div key={i} style={{position:"relative",display:"inline-block"}}><img src={img} className="img-thumb" onClick={()=>setLb(img)}/><button onClick={()=>onRemove(i)} style={{position:"absolute",top:-4,right:-4,width:16,height:16,borderRadius:"50%",background:"#E23A57",color:"#fff",border:"none",fontSize:9,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button></div>)}<div className="img-add" onClick={()=>fr.current.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();hf(e.dataTransfer.files);}}>📷<span>추가</span></div><input ref={fr} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>{hf(e.target.files);e.target.value="";}}/></div>{lb&&<div className="lightbox" onClick={()=>setLb(null)}><img src={lb}/></div>}</>;};

const Cmts=({comments=[],onAdd,onDelete})=>{const[op,setOp]=useState(false);const[tx,setTx]=useState("");const[au,setAu]=useState("me");const ref=useRef();
  const send=()=>{if(!tx.trim())return;onAdd({id:"c"+Date.now(),a:au,t:tx.trim(),ts:Date.now()});setTx("");};
  return <div style={{marginTop:8,borderTop:"1px dashed #E7E4EC",paddingTop:6}}><button className="cmt-toggle" onClick={()=>{setOp(!op);if(!op)setTimeout(()=>ref.current?.focus(),100);}}>💬 {comments.length>0?comments.length:"코멘트"}{op?" ▲":" ▼"}</button>
    {op&&<div style={{marginTop:6}}>{comments.length>0&&<div style={{maxHeight:200,overflowY:"auto"}}>{comments.map(c=>{const m=mem(c.a);return <div key={c.id} style={{padding:"7px 0",borderBottom:"1px solid #F0EEF2",fontSize:12}}><div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}><span style={{fontSize:12}}>{m?.em}</span><span style={{fontWeight:700,fontSize:10,color:m?.co}}>{m?.nm}</span><span style={{fontSize:9,color:"#aaa"}}>{fmtT(c.ts)}</span><button onClick={()=>onDelete(c.id)} style={{...ib,fontSize:10,marginLeft:"auto"}}>✕</button></div><div style={{color:"#333"}}>{c.t}</div></div>;})}</div>}
      <div style={{display:"flex",gap:4,marginTop:6}}><select value={au} onChange={e=>setAu(e.target.value)} style={{...sel,fontSize:10,width:52}}>{MM.map(m=><option key={m.id} value={m.id}>{m.em}</option>)}</select><input ref={ref} value={tx} onChange={e=>setTx(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();send();}}} placeholder="코멘트 입력..." style={{flex:1,border:"1px solid #E7E4EC",borderRadius:6,padding:"6px 8px",fontSize:12,outline:"none",fontFamily:"inherit"}}/><button onClick={send} style={{background:"#17151F",color:"#fff",border:"none",borderRadius:6,padding:"6px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>전송</button></div></div>}</div>;};

const TC=({t,onUpdate,onDelete})=>{const[ed,setEd]=useState(false);const d=dep(t.dept);const dl=dueL(t.due);
  return <div style={{background:t.urg?"#FFF8F8":"#fff",border:`1px solid ${t.urg?"#FFD0D0":"#E7E4EC"}`,borderRadius:12,padding:14,borderLeft:`3px solid ${d.co}`}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,alignItems:"center"}}><div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:9,fontWeight:700,color:d.co,background:d.co+"18",padding:"2px 6px",borderRadius:4}}>{d.ic} {d.nm}</span>{t.urg&&<span style={{fontSize:8,fontWeight:800,color:"#E23A57",background:"#FFE7EB",padding:"2px 5px",borderRadius:4}}>🔥</span>}</div><div style={{display:"flex",gap:3}}><button onClick={()=>onUpdate(t.id,{urg:!t.urg})} style={{...ib,opacity:t.urg?1:.3,fontSize:12}}>🔥</button><button onClick={()=>setEd(!ed)} style={ib}>✏️</button><button onClick={()=>onDelete(t.id)} style={ib}>🗑️</button></div></div>
    {ed?<><input value={t.title} onChange={e=>onUpdate(t.id,{title:e.target.value})} style={inp}/><textarea value={t.note||""} onChange={e=>onUpdate(t.id,{note:e.target.value})} style={{...inp,height:44,resize:"vertical",marginTop:4}} placeholder="메모"/><div style={{marginTop:6}}><div style={{fontSize:10,color:"#6E6B78",fontWeight:700,marginBottom:3}}>담당자</div><APick value={t.as} onChange={v=>onUpdate(t.id,{as:v})}/></div><div style={{display:"flex",gap:6,marginTop:6}}><select value={t.dept} onChange={e=>onUpdate(t.id,{dept:e.target.value})} style={sel}>{DPS.map(d=><option key={d.id} value={d.id}>{d.ic} {d.nm}</option>)}</select><input type="date" value={t.due||""} onChange={e=>onUpdate(t.id,{due:e.target.value})} style={{...sel,fontSize:10}}/></div></>:<><div style={{fontSize:13,fontWeight:600,marginBottom:3,lineHeight:1.4}}>{t.title}</div>{t.note&&<div style={{fontSize:11,color:"#6E6B78",lineHeight:1.5}}>{t.note}</div>}</>}
    <Imgs images={t.im||[]} onAdd={b=>onUpdate(t.id,{im:[...(t.im||[]),b]})} onRemove={i=>onUpdate(t.id,{im:(t.im||[]).filter((_,j)=>j!==i)})}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8,flexWrap:"wrap",gap:4}}><div style={{display:"flex",gap:3}}>{(t.as||[]).map(aid=>{const m=mem(aid);return m?<span key={aid} style={{display:"inline-flex",alignItems:"center",gap:2,background:m.co+"14",borderRadius:6,padding:"2px 6px"}}><span style={{fontSize:10}}>{m.em}</span><span style={{fontSize:9,color:m.co,fontWeight:600}}>{m.nm}</span></span>:null;})}</div><div style={{display:"flex",gap:6,alignItems:"center"}}>{dl&&<span style={{fontSize:9,fontWeight:600,color:dl.c}}>{dl.t}</span>}<select value={t.status} onChange={e=>onUpdate(t.id,{status:e.target.value})} style={{...sel,fontSize:10,padding:"2px 6px",background:STS[t.status].bg,color:STS[t.status].co,fontWeight:700,border:"none"}}>{Object.entries(STS).map(([k,v])=><option key={k} value={k}>{v.lb}</option>)}</select></div></div>
    <Cmts comments={t.cm||[]} onAdd={c=>onUpdate(t.id,{cm:[...(t.cm||[]),c]})} onDelete={cid=>onUpdate(t.id,{cm:(t.cm||[]).filter(x=>x.id!==cid)})}/></div>;};

const IC=({idea,tags,bc,onUpdate,onDelete})=>{const[ed,setEd]=useState(false);const tg=tags.find(x=>x.id===idea.tg)||{lb:"?",co:"#999"};const nc=NCS.find(c=>c.id===idea.cl)||NCS[0];
  return <div style={{background:nc.bg,border:`1px solid ${nc.br}`,borderRadius:"4px 16px 16px 16px",padding:14,boxShadow:idea.st?"0 0 0 2px #FFC53D":"none"}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:9,fontWeight:700,color:tg.co,background:tg.co+"18",padding:"2px 7px",borderRadius:4}}>{tg.lb}</span><div style={{display:"flex",gap:2}}><button onClick={()=>onUpdate(idea.id,{st:!idea.st})} style={{...ib,fontSize:13}}>{idea.st?"⭐":"☆"}</button><button onClick={()=>setEd(!ed)} style={ib}>✏️</button><button onClick={()=>onDelete(idea.id)} style={ib}>🗑️</button></div></div>
    {ed?<><input value={idea.title} onChange={e=>onUpdate(idea.id,{title:e.target.value})} style={inp}/><textarea value={idea.body||""} onChange={e=>onUpdate(idea.id,{body:e.target.value})} style={{...inp,height:60,resize:"vertical",marginTop:4}}/><div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}><select value={idea.tg} onChange={e=>onUpdate(idea.id,{tg:e.target.value})} style={sel}>{tags.map(t=><option key={t.id} value={t.id}>{t.lb}</option>)}</select><div style={{display:"flex",gap:3}}>{NCS.map(c=><button key={c.id} onClick={()=>onUpdate(idea.id,{cl:c.id})} style={{width:16,height:16,borderRadius:"50%",background:c.bg,border:idea.cl===c.id?`2px solid ${bc}`:`1px solid ${c.br}`,cursor:"pointer",padding:0}}/>)}</div></div></>:<><div style={{fontSize:13.5,fontWeight:700,marginBottom:4,lineHeight:1.4}}>{idea.title}</div>{idea.body&&<div style={{fontSize:12,color:"#444",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{idea.body}</div>}</>}
    <Imgs images={idea.im||[]} onAdd={b=>onUpdate(idea.id,{im:[...(idea.im||[]),b]})} onRemove={i=>onUpdate(idea.id,{im:(idea.im||[]).filter((_,j)=>j!==i)})}/>
    <Cmts comments={idea.cm||[]} onAdd={c=>onUpdate(idea.id,{cm:[...(idea.cm||[]),c]})} onDelete={cid=>onUpdate(idea.id,{cm:(idea.cm||[]).filter(x=>x.id!==cid)})}/></div>;};

function App(){
  const[data,setData]=useState(loadData);const[mode,setMode]=useState("tasks");const[tv,setTv]=useState("kanban");
  const[td,setTd]=useState("all");const[ta,setTa]=useState("all");const[uo,setUo]=useState(false);
  const[sat,setSat]=useState(false);const[nt,setNt]=useState({dept:"plan",title:"",as:["me"],note:"",urg:false,due:""});
  const[ib2,setIb]=useState("plan");const[it,setIt]=useState("all");const[so,setSo]=useState(false);
  const[sai,setSai]=useState(false);const[ni,setNi]=useState({bd:"plan",tg:"format",cl:"yellow",title:"",body:"",st:false});
  const[sq,setSq]=useState("");const[sf,setSf]=useState(false);

  const sv=d=>{setData(d);saveData(d);};
  const up=(k,id,u)=>sv({...data,[k]:data[k].map(x=>x.id===id?{...x,...u}:x)});
  const dl=(k,id)=>sv({...data,[k]:data[k].filter(x=>x.id!==id)});
  const addT=()=>{if(!nt.title.trim())return;sv({...data,tasks:[...data.tasks,{...nt,id:"t"+Date.now(),status:"todo",cm:[],im:[]}]});setNt({dept:"plan",title:"",as:["me"],note:"",urg:false,due:""});setSat(false);};
  const addI=()=>{if(!ni.title.trim())return;const tgs=ITS[ib2];sv({...data,ideas:[...data.ideas,{...ni,id:"i"+Date.now(),cm:[],im:[]}]});setNi({bd:ib2,tg:tgs[0].id,cl:"yellow",title:"",body:"",st:false});setSai(false);};
  const reset=()=>{if(confirm("초기화?")){sv({tasks:DT,ideas:DIDEAS});}};

  const sRes=sq.trim().length>=2?[...data.tasks.filter(t=>t.title.toLowerCase().includes(sq.toLowerCase())||(t.note||"").toLowerCase().includes(sq.toLowerCase())).map(t=>({...t,_t:"task"})),...data.ideas.filter(i=>i.title.toLowerCase().includes(sq.toLowerCase())||(i.body||"").toLowerCase().includes(sq.toLowerCase())).map(i=>({...i,_t:"idea"}))]:[];

  let fT=data.tasks.filter(t=>(td==="all"||t.dept===td)&&(ta==="all"||(t.as||[]).includes(ta)));
  if(uo)fT=fT.filter(t=>t.urg);
  const st={total:fT.length,done:fT.filter(t=>t.status==="done").length,doing:fT.filter(t=>t.status==="doing").length,todo:fT.filter(t=>t.status==="todo").length};
  const tags=ITS[ib2];const bC=ib2==="plan"?"#FF4D6D":"#0EAFA0";
  let fI=data.ideas.filter(i=>i.bd===ib2);if(it!=="all")fI=fI.filter(i=>i.tg===it);if(so)fI=fI.filter(i=>i.st);
  const tlM={};if(tv==="timeline"){fT.filter(t=>t.due).sort((a,b)=>a.due.localeCompare(b.due)).forEach(t=>{const m=t.due.slice(0,7);if(!tlM[m])tlM[m]=[];tlM[m].push(t);});}

  return <div style={{minHeight:"100vh",background:"#F6F4F7"}}>
    <header style={{background:"#17151F",padding:"10px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div><div style={{color:"#FF4D6D",fontSize:9,fontWeight:700,letterSpacing:2}}>ROTATION DATING CO.</div><div style={{color:"#fff",fontSize:15,fontWeight:800}}>운영 보드</div></div>
        <div style={{display:"flex",background:"#2a2835",borderRadius:10,overflow:"hidden"}}>{[{k:"tasks",l:"📋 업무",c:"#FF4D6D"},{k:"ideas",l:"💡 아이디어",c:"#FFC53D"}].map(x=><button key={x.k} onClick={()=>{setMode(x.k);setSq("");}} style={{background:mode===x.k?x.c:"transparent",color:mode===x.k?(x.k==="ideas"?"#17151F":"#fff"):"#6E6B78",border:"none",padding:"7px 14px",fontSize:11,fontWeight:700,cursor:"pointer"}}>{x.l}</button>)}</div>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <div style={{width:200,position:"relative"}}><span style={{position:"absolute",left:10,top:9,fontSize:12,opacity:.4}}>🔍</span><input value={sq} onChange={e=>{setSq(e.target.value);setSf(true);}} onFocus={()=>setSf(true)} onBlur={()=>setTimeout(()=>setSf(false),200)} placeholder="전체 검색..." style={{width:"100%",border:"1px solid #444",borderRadius:10,padding:"8px 14px 8px 30px",fontSize:12,outline:"none",fontFamily:"inherit",background:"#2a2835",color:"#fff"}}/>{sf&&sRes.length>0&&<div className="sr-wrap">{sRes.slice(0,8).map(r=>{const d=r._t==="task"?dep(r.dept):null;return <div key={r.id} className="sr-i" onClick={()=>{if(r._t==="task"){setMode("tasks");setTd(r.dept);}else{setMode("ideas");setIb(r.bd);}setSq("");}}><span style={{fontSize:8,fontWeight:700,padding:"2px 5px",borderRadius:3,background:(d?d.co:"#0EAFA0")+"18",color:d?d.co:"#0EAFA0",marginRight:6}}>{r._t==="task"?"업무":"아이디어"}</span><span style={{fontWeight:600}}>{r.title}</span>{(r.note||r.body)&&<div style={{fontSize:10,color:"#6E6B78",marginTop:2}}>{r.note||r.body}</div>}</div>;})}</div>}</div>
        {MM.map(m=><div key={m.id} style={{background:"#2a2835",borderRadius:7,padding:"4px 9px",display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:11}}>{m.em}</span><span style={{color:m.co,fontSize:10,fontWeight:700}}>{m.nm}</span></div>)}
        <button onClick={reset} style={{background:"transparent",color:"#555",border:"1px solid #333",borderRadius:6,padding:"4px 7px",fontSize:9,cursor:"pointer"}}>초기화</button>
      </div>
    </header>

    {mode==="tasks"&&<>
      <div style={{background:"#fff",borderBottom:"1px solid #E7E4EC",padding:"8px 20px",display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:12}}>{[{l:"전체",v:st.total,c:"#17151F"},{l:"할 일",v:st.todo,c:"#6E6B78"},{l:"진행 중",v:st.doing,c:"#E8A23D"},{l:"완료",v:st.done,c:"#0EAFA0"}].map(s=><div key={s.l} style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:s.c}}>{s.v}</div><div style={{fontSize:9,color:"#6E6B78"}}>{s.l}</div></div>)}</div>
        <div style={{flex:1}}/>
        <div style={{display:"flex",background:"#F0EEF2",borderRadius:8,overflow:"hidden"}}>{[{k:"kanban",l:"칸반"},{k:"timeline",l:"타임라인"}].map(v=><button key={v.k} onClick={()=>setTv(v.k)} style={{background:tv===v.k?"#17151F":"transparent",color:tv===v.k?"#fff":"#6E6B78",border:"none",padding:"5px 12px",fontSize:10,fontWeight:700,cursor:"pointer"}}>{v.l}</button>)}</div>
        <button onClick={()=>setSat(true)} style={{background:"#FF4D6D",color:"#fff",border:"none",borderRadius:8,padding:"7px 14px",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ 업무</button>
      </div>
      <div style={{padding:"8px 20px",display:"flex",gap:5,flexWrap:"wrap"}}>
        <Chip on={td==="all"} onClick={()=>setTd("all")}>전체</Chip>
        {DPS.map(d=><Chip key={d.id} on={td===d.id} color={d.co} onClick={()=>setTd(d.id)}>{d.ic} {d.nm}</Chip>)}
        <span style={{width:1,background:"#E7E4EC",margin:"0 3px"}}/>
        <Chip on={ta==="all"} onClick={()=>setTa("all")}>모두</Chip>
        {MM.map(m=><Chip key={m.id} on={ta===m.id} color={m.co} onClick={()=>setTa(m.id)}>{m.em} {m.nm}</Chip>)}
        <span style={{width:1,background:"#E7E4EC",margin:"0 3px"}}/>
        <Chip on={uo} color={uo?"#E23A57":null} onClick={()=>setUo(!uo)}>🔥 긴급만</Chip>
      </div>
      {tv==="kanban"&&<div style={{padding:"0 20px 40px",display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,alignItems:"flex-start"}}>{Object.entries(STS).map(([key,s])=>{const col=fT.filter(t=>t.status===key).sort((a,b)=>(b.urg?1:0)-(a.urg?1:0)||(a.due||"z").localeCompare(b.due||"z"));return <div key={key}><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:8,padding:"0 4px"}}><div style={{width:7,height:7,borderRadius:"50%",background:s.co}}/><span style={{fontSize:12,fontWeight:700,color:s.co}}>{s.lb}</span><span style={{fontSize:10,color:"#aaa"}}>({col.length})</span></div><div style={{display:"flex",flexDirection:"column",gap:8}}>{col.map(t=><TC key={t.id} t={t} onUpdate={(id,u)=>up("tasks",id,u)} onDelete={id=>dl("tasks",id)}/>)}{col.length===0&&<div style={{textAlign:"center",padding:16,color:"#ccc",fontSize:11}}>—</div>}</div></div>;})}</div>}
      {tv==="timeline"&&<div style={{padding:"10px 20px 40px",maxWidth:800,margin:"0 auto"}}>{Object.keys(tlM).length===0&&<div style={{textAlign:"center",padding:40,color:"#ccc",fontSize:12}}>마감일 없음</div>}{Object.entries(tlM).map(([m,tasks])=><div key={m} style={{marginBottom:24}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><div style={{background:"#17151F",color:"#fff",borderRadius:8,padding:"4px 12px",fontSize:14,fontWeight:800}}>{m.split("-")[1]}월</div><div style={{flex:1,height:1,background:"#E7E4EC"}}/><span style={{fontSize:10,color:"#6E6B78"}}>{tasks.length}건</span></div><div style={{display:"flex",flexDirection:"column",gap:8,paddingLeft:8,borderLeft:"2px solid #E7E4EC"}}>{tasks.map(t=><div key={t.id} style={{marginLeft:12}}><TC t={t} onUpdate={(id,u)=>up("tasks",id,u)} onDelete={id=>dl("tasks",id)}/></div>)}</div></div>)}{fT.filter(t=>!t.due&&t.status!=="done").length>0&&<div style={{marginBottom:24}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><div style={{background:"#6E6B78",color:"#fff",borderRadius:8,padding:"4px 12px",fontSize:14,fontWeight:800}}>미정</div><div style={{flex:1,height:1,background:"#E7E4EC"}}/></div><div style={{display:"flex",flexDirection:"column",gap:8,paddingLeft:8,borderLeft:"2px dashed #E7E4EC"}}>{fT.filter(t=>!t.due&&t.status!=="done").map(t=><div key={t.id} style={{marginLeft:12}}><TC t={t} onUpdate={(id,u)=>up("tasks",id,u)} onDelete={id=>dl("tasks",id)}/></div>)}</div></div>}</div>}
      {sat&&<Modal onClose={()=>setSat(false)} title="업무 추가"><Lbl>부서</Lbl><select value={nt.dept} onChange={e=>setNt({...nt,dept:e.target.value})} style={inp}>{DPS.map(d=><option key={d.id} value={d.id}>{d.ic} {d.nm}</option>)}</select><Lbl>제목</Lbl><input value={nt.title} onChange={e=>setNt({...nt,title:e.target.value})} style={inp} placeholder="업무 내용" autoFocus/><Lbl>담당자</Lbl><APick value={nt.as} onChange={v=>setNt({...nt,as:v})} sz="md"/><Lbl>마감일</Lbl><input type="date" value={nt.due} onChange={e=>setNt({...nt,due:e.target.value})} style={inp}/><Lbl>메모</Lbl><textarea value={nt.note} onChange={e=>setNt({...nt,note:e.target.value})} style={{...inp,height:50}} placeholder="참고"/><div style={{marginTop:8}}><Chip on={nt.urg} color={nt.urg?"#E23A57":null} onClick={()=>setNt({...nt,urg:!nt.urg})}>🔥 {nt.urg?"긴급":"긴급 표시"}</Chip></div><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}><button onClick={()=>setSat(false)} style={{background:"transparent",border:"1px solid #E7E4EC",borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer"}}>취소</button><button onClick={addT} style={{background:"#FF4D6D",color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",fontSize:13,fontWeight:700,cursor:"pointer"}}>추가</button></div></Modal>}
    </>}

    {mode==="ideas"&&<>
      <div style={{background:"#fff",borderBottom:"1px solid #E7E4EC",padding:"8px 20px",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        {[{id:"plan",n:"기획",e:"🎯",c:"#FF4D6D"},{id:"mkt",n:"마케팅",e:"📢",c:"#0EAFA0"}].map(b=><Chip key={b.id} on={ib2===b.id} color={b.c} onClick={()=>{setIb(b.id);setIt("all");}}>{b.e} {b.n}</Chip>)}
        <span style={{width:1,height:18,background:"#E7E4EC"}}/>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}><Chip on={it==="all"} color={bC} onClick={()=>setIt("all")}>전체</Chip>{tags.map(t=><Chip key={t.id} on={it===t.id} color={t.co} onClick={()=>setIt(t.id)}>{t.lb}</Chip>)}</div>
        <Chip on={so} color={so?"#FFC53D":null} onClick={()=>setSo(!so)}>⭐</Chip>
        <div style={{flex:1}}/><span style={{fontSize:11,color:"#6E6B78",fontWeight:600}}>{fI.length}개</span>
        <button onClick={()=>{setNi({bd:ib2,tg:tags[0].id,cl:"yellow",title:"",body:"",st:false});setSai(true);}} style={{background:bC,color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ 아이디어</button>
      </div>
      <div style={{padding:20,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12,alignItems:"start"}}>{fI.map(idea=><IC key={idea.id} idea={idea} tags={tags} bc={bC} onUpdate={(id,u)=>up("ideas",id,u)} onDelete={id=>dl("ideas",id)}/>)}{fI.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:50,color:"#ccc"}}><div style={{fontSize:28,marginBottom:6}}>💭</div><div style={{fontSize:12}}>아이디어를 추가해보세요</div></div>}</div>
      {sai&&<Modal onClose={()=>setSai(false)} title="💡 새 아이디어"><Lbl>카테고리</Lbl><select value={ni.tg} onChange={e=>setNi({...ni,tg:e.target.value})} style={inp}>{tags.map(t=><option key={t.id} value={t.id}>{t.lb}</option>)}</select><Lbl>제목</Lbl><input value={ni.title} onChange={e=>setNi({...ni,title:e.target.value})} style={inp} placeholder="한 줄 요약" autoFocus/><Lbl>내용</Lbl><textarea value={ni.body} onChange={e=>setNi({...ni,body:e.target.value})} style={{...inp,height:68}} placeholder="상세 설명"/><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}><div style={{display:"flex",gap:3}}>{NCS.map(c=><button key={c.id} onClick={()=>setNi({...ni,cl:c.id})} style={{width:20,height:20,borderRadius:"50%",background:c.bg,border:ni.cl===c.id?`2px solid ${bC}`:`1px solid ${c.br}`,cursor:"pointer",padding:0}}/>)}</div><Chip on={ni.st} color={ni.st?"#FFC53D":null} onClick={()=>setNi({...ni,st:!ni.st})}>{ni.st?"⭐ 핵심":"☆ 핵심"}</Chip></div><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}><button onClick={()=>setSai(false)} style={{background:"transparent",border:"1px solid #E7E4EC",borderRadius:8,padding:"8px 16px",fontSize:13,cursor:"pointer"}}>취소</button><button onClick={addI} style={{background:bC,color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",fontSize:13,fontWeight:700,cursor:"pointer"}}>추가</button></div></Modal>}
    </>}
  </div>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
