const SK="rotation-board-v2";
const mem=id=>MEMBERS.find(m=>m.id===id);
const dep=id=>DEPTS.find(d=>d.id===id);
const todayS=new Date().toISOString().slice(0,10);
function dueL(due){if(!due)return null;const d=Math.ceil((new Date(due)-new Date(todayS))/864e5);if(d<0)return{t:`${-d}일 지남`,c:"#C00000"};if(d===0)return{t:"오늘",c:"#E23A57"};if(d<=7)return{t:`${d}일 남음`,c:"#E8A23D"};return{t:due.slice(5).replace("-","/"),c:"#6E6B78"};}
function loadData(){try{const s=localStorage.getItem(SK);if(s)return JSON.parse(s);}catch{}return{tasks:DT,ideas:DI};}
function saveData(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch{}}

// Styles
const S={
  chip:{background:"transparent",border:"1px solid #E7E4EC",borderRadius:999,padding:"4px 10px",fontSize:10,fontWeight:600,color:"#6E6B78",cursor:"pointer"},
  chipOn:{background:"#17151F",color:"#fff",borderColor:"#17151F"},
  ib:{background:"none",border:"none",fontSize:11,cursor:"pointer",padding:2,opacity:.4},
  inp:{width:"100%",border:"1px solid #E7E4EC",borderRadius:8,padding:"8px 10px",fontSize:13,outline:"none",fontFamily:"inherit",boxSizing:"border-box"},
  sel:{border:"1px solid #E7E4EC",borderRadius:6,padding:"4px 8px",fontSize:11,outline:"none",fontFamily:"inherit",cursor:"pointer"},
};

function Chip({on,color,children,...p}){return e("button",{style:{...S.chip,...(on?(color?{background:color,color:"#fff",borderColor:color}:S.chipOn):{})},className:"chip",...p},children);}
function Lbl({children}){return e("div",{style:{fontSize:11,fontWeight:700,color:"#6E6B78",marginBottom:3,marginTop:8}},children);}

function APicker({value=[],onChange,sz}){
  const toggle=id=>{const n=value.includes(id)?value.filter(v=>v!==id):[...value,id];if(n.length)onChange(n);};
  return e("div",{style:{display:"flex",gap:4}},MEMBERS.map(m=>{
    const on=value.includes(m.id);
    return e("button",{key:m.id,onClick:()=>toggle(m.id),style:{display:"flex",alignItems:"center",gap:4,background:on?m.color+"18":"transparent",border:on?`1.5px solid ${m.color}`:"1.5px solid #E7E4EC",borderRadius:8,padding:sz==="md"?"5px 10px":"3px 8px",fontSize:sz==="md"?12:10,fontWeight:600,color:on?m.color:"#aaa",cursor:"pointer"}},m.emoji+" "+m.name);
  }));
}

function Modal({onClose,title,children}){
  return e("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100},onClick:onClose},
    e("div",{style:{background:"#fff",borderRadius:16,padding:22,width:400,maxWidth:"92vw",maxHeight:"90vh",overflow:"auto"},onClick:ev=>ev.stopPropagation()},
      e("div",{style:{fontSize:16,fontWeight:800,marginBottom:14}},title),children));
}

function TaskCard({t,onUpdate,onDelete}){
  const[ed,setEd]=useState(false);const d=dep(t.dept);const dl=dueL(t.due);
  const card=e("div",{style:{background:t.urgent?"#FFF8F8":"#fff",border:`1px solid ${t.urgent?"#FFD0D0":"#E7E4EC"}`,borderRadius:12,padding:14,borderLeft:`3px solid ${d.color}`}},
    e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6,alignItems:"center"}},
      e("div",{style:{display:"flex",gap:4,alignItems:"center"}},
        e("span",{style:{fontSize:9,fontWeight:700,color:d.color,background:d.color+"18",padding:"2px 6px",borderRadius:4}},d.icon+" "+d.name),
        t.urgent&&e("span",{style:{fontSize:8,fontWeight:800,color:"#E23A57",background:"#FFE7EB",padding:"2px 5px",borderRadius:4}},"🔥 긴급")),
      e("div",{style:{display:"flex",gap:3}},
        e("button",{onClick:()=>onUpdate(t.id,{urgent:!t.urgent}),style:{...S.ib,opacity:t.urgent?1:.3,fontSize:12},title:"긴급"},"🔥"),
        e("button",{onClick:()=>setEd(!ed),style:S.ib},"✏️"),
        e("button",{onClick:()=>onDelete(t.id),style:S.ib},"🗑️"))),
    ed?e(React.Fragment,null,
      e("input",{value:t.title,onChange:ev=>onUpdate(t.id,{title:ev.target.value}),style:S.inp}),
      e("textarea",{value:t.note||"",onChange:ev=>onUpdate(t.id,{note:ev.target.value}),style:{...S.inp,height:44,resize:"vertical",marginTop:4},placeholder:"메모"}),
      e("div",{style:{marginTop:6}},e("div",{style:{fontSize:10,color:"#6E6B78",fontWeight:700,marginBottom:3}},"담당자"),e(APicker,{value:t.assignees,onChange:v=>onUpdate(t.id,{assignees:v})})),
      e("div",{style:{display:"flex",gap:6,marginTop:6}},
        e("select",{value:t.dept,onChange:ev=>onUpdate(t.id,{dept:ev.target.value}),style:S.sel},DEPTS.map(d=>e("option",{key:d.id,value:d.id},d.icon+" "+d.name))),
        e("input",{type:"date",value:t.due||"",onChange:ev=>onUpdate(t.id,{due:ev.target.value}),style:{...S.sel,fontSize:10}}))
    ):e(React.Fragment,null,
      e("div",{style:{fontSize:13,fontWeight:600,marginBottom:3,lineHeight:1.4}},t.title),
      t.note&&e("div",{style:{fontSize:11,color:"#6E6B78",lineHeight:1.5}},t.note)),
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8,flexWrap:"wrap",gap:4}},
      e("div",{style:{display:"flex",gap:3}},(t.assignees||[]).map(aid=>{const m=mem(aid);return m?e("span",{key:aid,style:{display:"inline-flex",alignItems:"center",gap:2,background:m.color+"14",borderRadius:6,padding:"2px 6px"}},e("span",{style:{fontSize:10}},m.emoji),e("span",{style:{fontSize:9,color:m.color,fontWeight:600}},m.name)):null;})),
      e("div",{style:{display:"flex",gap:6,alignItems:"center"}},
        dl&&e("span",{style:{fontSize:9,fontWeight:600,color:dl.c}},dl.t),
        e("select",{value:t.status,onChange:ev=>onUpdate(t.id,{status:ev.target.value}),style:{...S.sel,fontSize:10,padding:"2px 6px",background:STATUS[t.status].bg,color:STATUS[t.status].color,fontWeight:700,border:"none"}},Object.entries(STATUS).map(([k,v])=>e("option",{key:k,value:k},v.label))))));
  return card;
}

function IdeaCard({idea,tags,bc,onUpdate,onDelete}){
  const[ed,setEd]=useState(false);const tg=tags.find(x=>x.id===idea.tag)||{label:"?",color:"#999"};const nc=NCS.find(c=>c.id===idea.color)||NCS[0];
  return e("div",{style:{background:nc.bg,border:`1px solid ${nc.br}`,borderRadius:"4px 16px 16px 16px",padding:14,boxShadow:idea.starred?"0 0 0 2px #FFC53D":"none"}},
    e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
      e("span",{style:{fontSize:9,fontWeight:700,color:tg.color,background:tg.color+"18",padding:"2px 7px",borderRadius:4}},tg.label),
      e("div",{style:{display:"flex",gap:2}},
        e("button",{onClick:()=>onUpdate(idea.id,{starred:!idea.starred}),style:{...S.ib,fontSize:13}},idea.starred?"⭐":"☆"),
        e("button",{onClick:()=>setEd(!ed),style:S.ib},"✏️"),
        e("button",{onClick:()=>onDelete(idea.id),style:S.ib},"🗑️"))),
    ed?e(React.Fragment,null,
      e("input",{value:idea.title,onChange:ev=>onUpdate(idea.id,{title:ev.target.value}),style:S.inp}),
      e("textarea",{value:idea.body||"",onChange:ev=>onUpdate(idea.id,{body:ev.target.value}),style:{...S.inp,height:60,resize:"vertical",marginTop:4}}),
      e("div",{style:{display:"flex",gap:6,marginTop:6,flexWrap:"wrap",alignItems:"center"}},
        e("select",{value:idea.tag,onChange:ev=>onUpdate(idea.id,{tag:ev.target.value}),style:S.sel},tags.map(t=>e("option",{key:t.id,value:t.id},t.label))),
        e("div",{style:{display:"flex",gap:3}},NCS.map(c=>e("button",{key:c.id,onClick:()=>onUpdate(idea.id,{color:c.id}),style:{width:16,height:16,borderRadius:"50%",background:c.bg,border:idea.color===c.id?`2px solid ${bc}`:`1px solid ${c.br}`,cursor:"pointer",padding:0}}))))

      e("div",{style:{fontSize:13.5,fontWeight:700,marginBottom:4,lineHeight:1.4}},idea.title),
      idea.body&&e("div",{style:{fontSize:12,color:"#444",lineHeight:1.6,whiteSpace:"pre-wrap"}},idea.body)));
}
